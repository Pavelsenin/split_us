<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">Split Us Admin</title>
    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #f5f1e8, #dfe8f1);
            color: #1f2933;
        }
        main {
            max-width: 1120px;
            margin: 40px auto;
            padding: 32px;
            background: rgba(255, 255, 255, 0.86);
            border-radius: 20px;
            box-shadow: 0 18px 48px rgba(31, 41, 51, 0.12);
        }
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }
        .pill {
            display: inline-block;
            padding: 8px 14px;
            border-radius: 999px;
            background: #164e63;
            color: #fff;
            font-size: 14px;
        }
        h1 {
            margin-top: 16px;
            margin-bottom: 8px;
            font-size: 36px;
        }
        p {
            line-height: 1.6;
        }
        .toolbar {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 24px;
            margin-bottom: 24px;
        }
        .toolbar input {
            min-width: 320px;
            flex: 1;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid #cbd5e1;
        }
        .toolbar button,
        .logout button {
            padding: 12px 16px;
            border: 0;
            border-radius: 12px;
            background: #0f766e;
            color: #fff;
            cursor: pointer;
        }
        .logout button {
            background: #475569;
        }
        .flash {
            padding: 12px 14px;
            margin-bottom: 20px;
            border-radius: 12px;
            background: #dcfce7;
            color: #166534;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            overflow: hidden;
            border-radius: 16px;
            background: #fff;
        }
        th,
        td {
            padding: 14px 16px;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
            vertical-align: top;
        }
        th {
            background: #f8fafc;
            font-size: 13px;
            color: #475569;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        tr:last-child td {
            border-bottom: 0;
        }
        .muted {
            color: #64748b;
            font-size: 14px;
        }
        a {
            color: #0f766e;
            text-decoration: none;
        }
        code {
            font-size: 13px;
        }
    </style>
</head>
<body>
<main>
    <div class="topbar">
        <div>
            <span class="pill" th:text="'Environment: ' + ${environmentName}">Environment: local</span>
            <h1>Админ-панель Split Us</h1>
            <p>Read-only просмотр чеков с поиском по названию, UUID, invite token и username владельца.</p>
        </div>
        <form class="logout" th:action="@{/admin/logout}" method="post">
            <button type="submit" th:text="'Выйти (' + ${currentLogin} + ')'">Выйти</button>
        </form>
    </div>

    <div class="flash" th:if="${flashMessage}" th:text="${flashMessage}">Чек удалён.</div>

    <form class="toolbar" th:action="@{/admin}" method="get">
        <input type="text" name="q" th:value="${searchQuery}" placeholder="Поиск: название, UUID, invite token, username">
        <button type="submit">Найти</button>
    </form>

    <table>
        <thead>
        <tr>
            <th>Чек</th>
            <th>Владелец</th>
            <th>Участники</th>
            <th>Расходы</th>
            <th>Чат</th>
            <th>Создан</th>
        </tr>
        </thead>
        <tbody>
        <tr th:if="${checks.isEmpty()}">
            <td colspan="6">Чеки не найдены.</td>
        </tr>
        <tr th:each="check : ${checks}">
            <td>
                <a th:href="@{/admin/checks/{id}(id=${check.id})}" th:text="${check.title}">Trip</a>
                <div class="muted"><code th:text="${check.id}">uuid</code></div>
                <div class="muted">invite: <code th:text="${check.inviteToken}">token</code></div>
            </td>
            <td th:text="${check.ownerTelegramUsername != null ? '@' + check.ownerTelegramUsername : 'without username'}">@owner</td>
            <td th:text="${check.activeParticipantCount}">0</td>
            <td th:text="${check.expenseCount}">0</td>
            <td>
                <div th:text="${check.chatActive ? 'active' : 'inactive'}">active</div>
                <div class="muted" th:text="${check.telegramChatId != null ? check.telegramChatId : 'no chat'}">no chat</div>
            </td>
            <td th:text="${#temporals.format(check.createdAt, 'yyyy-MM-dd HH:mm')}">2026-04-05 04:00</td>
        </tr>
        </tbody>
    </table>
</main>
</body>
</html>
