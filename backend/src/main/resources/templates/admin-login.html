<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Split Us Admin Login</title>
    <style>
        body {
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at top left, rgba(210, 160, 107, 0.45), transparent 36%),
                linear-gradient(145deg, #fcfaf5, #dbe7f0);
        }
        form {
            width: min(420px, calc(100vw - 32px));
            padding: 28px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.88);
            box-shadow: 0 22px 46px rgba(26, 54, 93, 0.14);
        }
        .pill {
            display: inline-block;
            padding: 8px 14px;
            border-radius: 999px;
            background: #164e63;
            color: #fff;
            font-size: 13px;
        }
        h1 {
            margin-top: 16px;
            margin-bottom: 12px;
        }
        label {
            display: block;
            margin-bottom: 12px;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 12px 14px;
            margin-top: 6px;
            border: 1px solid #c5d1db;
            border-radius: 12px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            margin-top: 16px;
            padding: 12px;
            border: 0;
            border-radius: 12px;
            background: #0f766e;
            color: #fff;
            font-size: 15px;
            cursor: pointer;
        }
        .hint {
            margin-top: 18px;
            color: #475569;
            font-size: 14px;
            line-height: 1.5;
        }
        .message {
            margin-top: 14px;
            padding: 12px 14px;
            border-radius: 12px;
            font-size: 14px;
        }
        .message.error {
            background: #fee2e2;
            color: #991b1b;
        }
        .message.ok {
            background: #dcfce7;
            color: #166534;
        }
    </style>
</head>
<body>
<form method="post" action="/admin/login">
    <span class="pill" th:text="${environmentName}">local</span>
    <h1>Вход в админ-панель</h1>
    <div class="message error" th:if="${hasError}">
        Неверный логин или пароль.
    </div>
    <div class="message ok" th:if="${loggedOut}">
        Сессия завершена.
    </div>
    <label>
        Логин
        <input type="text" name="username" autocomplete="username" placeholder="admin" autofocus>
    </label>
    <label>
        Пароль
        <input type="password" name="password" autocomplete="current-password" placeholder="password">
    </label>
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
    <button type="submit">Войти</button>
    <p class="hint">
        Для входа нужен admin-пользователь из `splitus.admin.bootstrap-*` конфигурации.
        Панель предназначена для поддержки и удаления чеков с подтверждением.
    </p>
</form>
</body>
</html>
