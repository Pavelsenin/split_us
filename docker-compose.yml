services:
  postgres:
    image: postgres:15
    container_name: splitus-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-splitus}
      POSTGRES_USER: ${POSTGRES_USER:-splitus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-splitus}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-splitus} -d ${POSTGRES_DB:-splitus}"]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:11.1.0
    container_name: splitus-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
  grafana-data:
